name: Build Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Zip dist
        run: |
          cd dist
          zip -r ../ThreadsTracker.zip .

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ThreadsTracker.zip
          generate_release_notes: true